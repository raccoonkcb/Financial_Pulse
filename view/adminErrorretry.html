<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크롤링 오류 재시도 관리자</title>
    <style>
        /* (기존 스타일 그대로 유지 - 생략) */
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; overflow:hidden; background:#f0f2f5; font-family:'Segoe UI','Malgun Gothic',sans-serif; }
        .window { height:100%; display:flex; flex-direction:column; background:white; }
        .title-bar { background:#1e2a3a; color:white; padding:14px 20px; font-weight:bold; font-size:18px; flex-shrink:0; }
        .fixed-header { flex-shrink:0; padding:20px 20px 0 20px; border-bottom:1px solid #e9ecef; background:white; }
        .table-scroll-area { flex:1; min-height:0; overflow-y:auto; padding:0 20px 20px 20px; }
        .table-wrapper { overflow-x:auto; border-radius:12px; border:1px solid #ddd; background:white; }
        .log-table { width:100%; border-collapse:collapse; font-size:13px; min-width:700px; table-layout:fixed; }
        .log-table th:nth-child(1), .log-table td:nth-child(1) { width:150px; }
        .log-table th:nth-child(2), .log-table td:nth-child(2) { width:80px; }
        .log-table th:nth-child(3), .log-table td:nth-child(3) { width:300px; }
        .log-table th:nth-child(4), .log-table td:nth-child(4) { width:60px; }
        .log-table th, .log-table td { border:1px solid #ddd; padding:10px 8px; text-align:left; vertical-align:top; }
        .msg-content { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; text-overflow:ellipsis; word-break:break-word; white-space:normal; line-height:1.4; cursor:help; }
        .log-table th { background:#e9ecef; font-weight:600; white-space:nowrap; }
        .error-row { background-color:#fff5f5; }
        .status-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:bold; }
        .status-error { background:#dc3545; color:white; }
        .status-warn { background:#ffc107; color:#212529; }
        .status-summary { display:flex; gap:20px; margin-bottom:20px; background:#f8f9fa; border-radius:12px; padding:12px 20px; flex-wrap:wrap; }
        .status-item { flex:1; text-align:center; }
        .status-count { font-size:28px; font-weight:bold; }
        .error-count { color:#dc3545; }
        .warn-count { color:#ffc107; }
        .retry-count { color:#17a2b8; }
        .btn-retry { background:#0d6efd; color:white; border:none; padding:10px 20px; border-radius:30px; font-size:14px; font-weight:bold; cursor:pointer; transition:0.2s; }
        .btn-retry:hover { background:#0b5ed7; transform:scale(1.02); }
        .btn-retry:disabled { background:#6c757d; cursor:not-allowed; }
        .message-area { margin-top:15px; padding:12px; border-radius:12px; font-size:13px; display:none; }
        .message-area.show { display:block; }
        hr { margin:15px 0; }
        .footer-note { font-size:12px; color:#6c757d; padding-bottom:15px; }
        .action-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
    </style>
</head>
<body>
<div class="window">
    <div class="title-bar">
        <span>🕷️ 크롤링 오류 현황</span>
    </div>

    <div class="fixed-header">
        <div class="status-summary">
            <div class="status-item"><div class="status-count error-count" id="errorCount">0</div><div>ERROR</div><div>패시브 대상</div></div>
            <div class="status-item"><div class="status-count warn-count" id="warnCount">0</div><div>WARN</div><div>비지역 실행</div></div>
            <div class="status-item"><div class="status-count retry-count" id="retryCount">0</div><div>재시도 예정</div><div>선택 항목</div></div>
        </div>

        <div class="action-bar">
            <div>
                <input type="checkbox" id="selectAll"> 전체 선택 (ERROR만)
            </div>
            <button class="btn-retry" id="retryBtn">🚀 오류 재시도 실행</button>
        </div>

        <div id="messageArea" class="message-area"></div>
        <hr>
        <div class="footer-note">
            ※ ERROR 로그 대상만 재시도 가능하며, 재시도 후 성공/실패 피드백을 보여줍니다.
        </div>
    </div>

    <div class="table-scroll-area">
        <div class="table-wrapper">
            <table class="log-table" id="logTable">
                <thead>
                    <tr><th>시간</th><th>레벨</th><th>메시지 / URL</th><th>선택</th></tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        const BASE_URL = window.location.origin;
        let errorItems = [];
        let warnLogs   = [];

        function mapLog(l, idx) {
            return {
                id    : l.log_id || `LOG-${String(idx + 1).padStart(5, '0')}`,
                time  : (l.timestamp || '').replace('T', ' ').slice(0, 19),
                level : (l.level || 'INFO').toUpperCase(),
                detail: l.message || '',
            };
        }

        async function loadLogs() {
            try {
                // ERROR 로그
                const resError = await fetch(BASE_URL + '/logs/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ subject: 'crawl', level: 'ERROR', size: 1000 })
                });
                const dataError = await resError.json();
                const payloadError = dataError.data || dataError;
                const errorLogs = (payloadError.logs || []).map(mapLog);

                // WARN 로그
                const resWarn = await fetch(BASE_URL + '/logs/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ subject: 'crawl', level: 'WARNING', size: 1000 })
                });
                const dataWarn = await resWarn.json();
                const payloadWarn = dataWarn.data || dataWarn;
                const warnLogs_ = (payloadWarn.logs || []).map(mapLog);

                errorItems = errorLogs.map(l => ({ ...l, selected: false }));
                warnLogs   = warnLogs_;

                console.log('✅ 로그 로드 성공 - ERROR:', errorItems.length, 'WARN:', warnLogs.length); // 디버깅
                renderTable();
            } catch (e) {
                console.error('로그 조회 실패:', e);
                showMessage('⚠️ 로그를 불러오지 못했습니다: ' + e.message, 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('logBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            const allDisplay = [...errorItems, ...warnLogs];
            allDisplay.sort((a,b) => new Date(b.time) - new Date(a.time));

            allDisplay.forEach(item => {
                const isError = item.level === "ERROR";
                const row = tbody.insertRow();
                row.className = isError ? 'error-row' : '';

                row.insertCell(0).innerText = item.time;
                const cellLevel = row.insertCell(1);
                const levelSpan = document.createElement('span');
                levelSpan.className = `status-badge ${isError ? 'status-error' : 'status-warn'}`;
                levelSpan.innerText = item.level;
                cellLevel.appendChild(levelSpan);

                const msgCell = row.insertCell(2);
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg-content';
                msgDiv.innerText = item.detail;
                msgDiv.title = item.detail;
                msgCell.appendChild(msgDiv);

                const cellSelect = row.insertCell(3);
                if (isError) {
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.checked = item.selected;
                    chk.addEventListener('change', (e) => {
                        item.selected = e.target.checked;
                        updateSummaryAndSelectAll();
                    });
                    cellSelect.appendChild(chk);
                } else {
                    cellSelect.innerText = '—';
                }
            });

            const errorCountSpan = document.getElementById('errorCount');
            const warnCountSpan = document.getElementById('warnCount');
            const retryCountSpan = document.getElementById('retryCount');
            if (errorCountSpan) errorCountSpan.innerText = errorItems.length;
            if (warnCountSpan) warnCountSpan.innerText = warnLogs.length;
            const selectedCount = errorItems.filter(e => e.selected).length;
            if (retryCountSpan) retryCountSpan.innerText = selectedCount;

            const selectAllChk = document.getElementById('selectAll');
            if (selectAllChk) {
                if (errorItems.length > 0) {
                    const allSelected = errorItems.every(e => e.selected);
                    selectAllChk.checked = allSelected;
                    selectAllChk.indeterminate = (!allSelected && errorItems.some(e => e.selected));
                } else {
                    selectAllChk.checked = false;
                    selectAllChk.indeterminate = false;
                }
            }
        }

        function updateSummaryAndSelectAll() {
            const selectedCount = errorItems.filter(e => e.selected).length;
            const retryCountSpan = document.getElementById('retryCount');
            if (retryCountSpan) retryCountSpan.innerText = selectedCount;
            const selectAllChk = document.getElementById('selectAll');
            if (!selectAllChk || errorItems.length === 0) return;
            const allSelected = errorItems.every(e => e.selected);
            selectAllChk.checked = allSelected;
            selectAllChk.indeterminate = (!allSelected && errorItems.some(e => e.selected));
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('messageArea');
            if (!msgDiv) return;
            msgDiv.innerHTML = `<strong>📢 ${type === 'error' ? '오류' : type === 'warning' ? '경고' : '알림'}:</strong> ${msg}`;
            msgDiv.className = 'message-area show';
            if (type === 'success') msgDiv.style.background = '#d1e7dd';
            else if (type === 'warning') msgDiv.style.background = '#fff3cd';
            else if (type === 'error') msgDiv.style.background = '#f8d7da';
            else msgDiv.style.background = '#e2f0fb';
        }

        function addTempMessage(msg) {
            const msgDiv = document.getElementById('messageArea');
            if (!msgDiv) return;
            const currentHtml = msgDiv.innerHTML;
            msgDiv.innerHTML = currentHtml + `<div style="font-size:12px; margin-top:5px;">⏳ ${msg}</div>`;
            msgDiv.classList.add('show');
        }

        // DOM이 완전히 로드된 후 이벤트 바인딩 및 데이터 로드
        document.addEventListener('DOMContentLoaded', () => {
            const selectAllChk = document.getElementById('selectAll');
            const retryBtn = document.getElementById('retryBtn');

            if (selectAllChk) {
                selectAllChk.addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    errorItems.forEach(item => item.selected = isChecked);
                    renderTable();
                });
            } else {
                console.warn('selectAll 요소를 찾을 수 없음');
            }

            if (retryBtn) {
                retryBtn.addEventListener('click', async () => {
                    const selectedErrors = errorItems.filter(item => item.selected);
                    if (selectedErrors.length === 0) {
                        showMessage("⚠️ 재시도할 오류 항목을 선택해주세요.", "warning");
                        return;
                    }

                    retryBtn.disabled = true;
                    const originalText = retryBtn.innerText;
                    retryBtn.innerText = "🔄 재시도 중...";

                    showMessage(`🔁 총 ${selectedErrors.length}개 오류에 대해 재시도를 시작합니다.`, "info");

                    let successCount = 0;
                    let failCount = 0;

                    for (let i = 0; i < selectedErrors.length; i++) {
                        const err = selectedErrors[i];
                        try {
                            const res = await fetch(BASE_URL + '/api/retry-missing', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                credentials: 'include',
                                body: JSON.stringify({ log_id: err.id, message: err.detail })
                            });
                            const result = await res.json();
                            if (res.ok && result.success) {
                                successCount++;
                                addTempMessage(`✅ 재시도 성공: ${err.detail.substring(0, 60)}...`);
                                const index = errorItems.findIndex(e => e.id === err.id);
                                if (index !== -1) errorItems.splice(index, 1);
                            } else {
                                throw new Error(result.message || '실패');
                            }
                        } catch(e) {
                            failCount++;
                            addTempMessage(`❌ 재시도 실패: ${err.detail.substring(0, 60)}... (${e.message})`);
                            err.selected = false;
                        }
                        renderTable();
                    }

                    retryBtn.disabled = false;
                    retryBtn.innerText = originalText;

                    const finalMsg = `✅ 재시도 완료: 성공 ${successCount}건, 실패 ${failCount}건. ${successCount > 0 ? '성공한 로그는 목록에서 제거되었습니다.' : ''}`;
                    showMessage(finalMsg, successCount > 0 ? "success" : "error");

                    if (failCount === 0 && errorItems.length === 0) {
                        showMessage("🎉 모든 오류가 해결되었습니다! 크롤링 정상화 상태입니다.", "success");
                    } else if (failCount > 0) {
                        showMessage(`⚠️ ${failCount}개 항목은 재시도에 실패했습니다. 네트워크/타겟 상태 확인 후 다시 시도하세요.`, "warning");
                    }
                    renderTable();
                });
            } else {
                console.warn('retryBtn 요소를 찾을 수 없음');
            }

            // 로그 로드 시작
            loadLogs();
        });
    })();
</script>
</body>
</html>
